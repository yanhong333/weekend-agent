<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeekendPilot 工作台版 Demo</title>
    <link rel="stylesheet" href="./style_workbench.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="wp-mark">WP</div>
        <nav class="side-nav" aria-label="功能导航">
          <button class="active" title="智能规划">●</button>
          <button title="灵感发现">✦</button>
          <button title="收藏夹">♡</button>
          <button title="历史行程">◷</button>
          <button title="设置">⚙</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1>WeekendPilot 本地活动规划 Agent</h1>
            <span class="beta">BETA</span>
          </div>
          <div class="top-meta">
            <span>上海</span>
            <span>24°C</span>
            <span>小明一家</span>
          </div>
        </header>

        <section class="dashboard">
          <section class="chat-panel">
            <div class="ai-title">
              <div class="bot-face"></div>
              <div>
                <strong>WeekendPilot AI</strong>
                <span>本地生活规划助手</span>
              </div>
            </div>

            <div class="chat-stream" id="chatStream">
              <div class="message ai">
                <p>你好！告诉我你的出行想法，我会帮你规划一套可执行的半日行程。</p>
              </div>
            </div>

            <form id="planForm" class="chat-form">
              <textarea
                id="userInput"
                rows="4"
                placeholder="例如：今天下午想带老婆和5岁孩子出去玩，别太远，老婆最近在减肥"
                required
              ></textarea>
              <div class="input-row">
                <input id="startLocation" type="text" placeholder="出发地：上海市徐汇区" required />
                <button type="button" id="demoBtn">示例</button>
                <button type="submit" id="submitBtn">发送</button>
              </div>
            </form>
          </section>

          <section class="analysis-panel card-panel">
            <div class="panel-head">
              <span>结构化需求分析</span>
              <strong id="parseSource">等待输入</strong>
            </div>
            <div id="intentResult" class="analysis-list empty">提交后展示时间、人群、预算、距离、饮食限制和偏好。</div>
            <div class="agent-note" id="agentNote">
              AI 洞察会在规划完成后显示。
            </div>
          </section>

          <section class="plan-panel">
            <section class="card-panel best-plan">
              <div class="panel-head">
                <span>最佳推荐行程</span>
                <strong id="planCount">0 个方案</strong>
              </div>
              <div id="bestPlanResult" class="empty">暂无推荐方案</div>
            </section>

            <section class="card-panel alternatives">
              <div class="panel-head">
                <span>更多备选方案</span>
                <strong id="mapSource">等待搜索</strong>
              </div>
              <div id="alternativePlans" class="alt-grid empty">暂无备选方案</div>
            </section>

            <section class="card-panel score-panel">
              <div class="panel-head">
                <span>智能评分对比</span>
                <strong id="apiStatus">后端 8848</strong>
              </div>
              <div id="scoreCompare" class="score-compare empty">暂无评分</div>
            </section>
          </section>
        </section>

        <section class="route-card">
          <div class="route-main">
            <div>
              <p class="route-kicker">方案一路线概览</p>
              <h2 id="routeTitle">等待生成路线</h2>
            </div>
            <div id="routeStats" class="route-stats">
              <span>总里程 --</span>
              <span>预计时长 --</span>
              <span>节点 --</span>
            </div>
          </div>
          <div class="map-preview">
            <img src="./assets/static-map-teal.svg" alt="静态路线地图预览" />
          </div>
        </section>
      </main>
    </div>

    <script src="./app_workbench.js"></script>
  </body>
</html>
